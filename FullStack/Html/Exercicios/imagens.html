<style>
    .circular{
        width: 513px;
        background-color: gray;
    }

    .texto{
        width: 400px;
    }
    
    .texto img{
        margin-right: 10px;
    }

    .cidade{
        width: 513px;
        height: 342px;
        background-image: url('http://files.cod3r.com.br/curso-web/imagem4.jpg');
        background-position: center;
        background-repeat: no-repeat;
        background-size: 200%;
    }

    [wm-slider] {
        position: relative;
        width: 513px;
        height: 342px;
        overflow: hidden;
        border: 2px solid black;
    }

    [wm-slider] p {
        position: absolute;
        margin: 0px;
        width: 513px;
        height: 342px;
    }

</style>

<script>
    function moverElemento(elemento, inicio, fim, passo, callback) {
        const novoInicio = inicio + passo

        if(novoInicio >= fim){
            elemento.style.left = fim + 'px'
            callback()
        }else{
            elemento.style.left = novoInicio + 'px'

            setTimeout(() => {
                moverElemento(elemento, novoInicio, fim, passo, callback)
            }, 7)
        }
    }

    function slider() {
        const elementos = document.querySelectorAll('[wm-slider] > p')
        const slides = Array.from(elementos)

        slides.forEach(slide => {
            slide.style.left = '-513px'
        })

        function exibirSlide(indice) {
            const slide = slides[indice]

            moverElemento(slide, -513, 513, 5, () => {
                slide.style.left = '-513px'

                const proximoIndice = indice + 1 >= slides.length ? 0 : indice + 1
                exibirSlide(proximoIndice)
            })
        }

        exibirSlide(0)
    }

    slider()
</script>
