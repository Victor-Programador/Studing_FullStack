<script>
    const itens = document.querySelectorAll('li') /*Pegamos todos os <li> e Todos eles entram dentro da variável itens.*/

        itens.forEach(function(item) { /*Passamos por cada item*/
            item.addEventListener('click', function(event) { /*Colocamos um evento de clique. Quando o usuário clicar nesse item, execute esse código: */
                event.stopPropagation() /*Evitamos clique duplicado. Sem isso, ao clicar em HTML, o JavaScript poderia entender que você clicou também em Front-end.*/

                const sublista = item.querySelector('ul')/*Procuramos uma sublista dentro do item clicado*/

                if (sublista) { /*Verificamos se existe sublista. Se existir, ele continua. Se não existir, não faz nada.*/
                    if (sublista.style.display === 'none') {/*Alternamos entre esconder e mostrar*/
                        sublista.style.display = 'block'/*Se estiver escondido, Mostra de novo*/
                    } else {
                        sublista.style.display = 'none' /*Se estiver aparecendo, esconde.*/
                    }
                }
            })
        })
</script>
