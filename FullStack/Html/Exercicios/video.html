<video id="meuVideo" width="800" height="450" controls autoplay controlsList="nodownload">
    <source src="http://files.cod3r.com.br/curso-web/video.mp4" type="video/mp4">
    Seu browser não suporta a tag video 
</video>

<div wm-progresso="meuVideo" class="progresso">
    <div></div>
</div>

<div>
    <button wm-play="meuVideo">Play</button>
    <button wm-pause="meuVideo">Pause</button>
</div>

<style>
    .progresso{
        height: 20px;
        width: 500px;
        border: solid 1px gray;
        margin: 20px;
    }

    .progresso div{
        background-color: red;
        color: white;
        height: 100%;
        text-align: right;
        font-size: 14px;
        width: 0%;
    }

</style>

<script>
    
    const video = document.getElementById('meuVideo')
    const progresso = document.querySelector('.progresso div')

    const botaoPlay = document.querySelector('[wm-play]')
    const botaoPause = document.querySelector('[wm-pause]')

    botaoPlay.onclick = () => {
        video.play()
    }

    botaoPause.onclick = () => {
        video.pause()
    }

    video.ontimeupdate = () => {
        const porcentagem = (video.currentTime / video.duration) * 100

        progresso.style.width = `${porcentagem}%`
        progresso.innerHTML = `${porcentagem.toFixed(1)}%`
    }
    

    

</script>
