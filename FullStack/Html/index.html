<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios HTML</title>
    <style>
        #conteudo{
            padding: 30px 0px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Exercícios HTML</h1>
    </header>
    <nav>
        <a href="Exercicios/teste.html">00 - teste</a> | 
        <a href="Exercicios/texto1.html">01 - texto1</a> |
        <a href="Exercicios/texto2.html">02 - texto2</a> |
        <a href="Exercicios/listas.html">03 - listas</a> |
        <a href="Exercicios/listaAninhada.html">04 - Lista Aninhada</a> |
        <a href="Exercicios/link.html">05 - links</a> |
        <a href="Exercicios/form/form.html">06 - formulário</a> |
        <a href="Exercicios/imagens.html">07 - imagens</a> |
        <a href="Exercicios/video.html">08 - video</a> |
    </nav>
    <section id="conteudo"></section>
    <footer>
        Curso de web moderno
    </footer>
    <script>
        document.querySelectorAll('a').forEach(link => {
            const conteudo =document.getElementById('conteudo')
            link.onclick = function(e){
                e.preventDefault()
                
                fetch(link.href)
                    .then(resp => resp.text())
                    .then(html => conteudo.innerHTML = html)
            }
        })
    </script>
</body>
</html>
