<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Desafio Card</title>
    <style>
        .central{
            padding: 5px;
            box-sizing: border-box;
            display: flex;
        }

        .curso{
            border: solid 2px lightgray;
            box-shadow: 0px 4px 20px 0px rgb(0, 0, 0, 0.3);
            margin: 0px 30px 0px 0px;
            padding: 8px 1px;
            width: 280px;
            text-align: center;
            font-size: 1.5em;
            height: 310px;
        }

        .curso-info{
            text-align: left;
            margin-left: 8px;
            height: 110px;
            width: 260px;
            overflow: hidden;
        }

        .curso-info h4 {
            margin: 0;
            padding: 0px 10px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: 600;
        }

        .curso-info p{
            width: 240px;
            padding-left: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        .curso img{
            width: 260px;
        }

        .curso-preco{
            display: flex;
            justify-content: flex-end;
            width: 260px;
        }

        .preco-de{
            color: red;
            font-size: 17px;
            align-self: flex-end;
            text-decoration: line-through;
            font-weight: 800;
        }

        .preco-por{
            color: green;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: bold;
        }

        
    </style>
</head>

<body>
    <h1>Card</h1>

    <h2>Objetivo</h2>
    <img src="http://files.cod3r.com.br/curso-web/card.png" height="340" alt="Objetivo">

    <h2>Resultado</h2>
    <div class="central">
        <div class="curso">
            <img src="http://files.cod3r.com.br/curso-web/curso1.jpg" />
            <div class="curso-info">
                <h4>Docker: Ferramenta essencial para Desenvolvedores</h4>
                <p>Prof. Fulano</p>
            </div>
            <div class="curso-preco">
                <span class="preco-de">R$80,00</span>
                <span class="preco-por">R$50,00</span>
            </div>
        </div>
        <div class="curso">
            <img src="http://files.cod3r.com.br/curso-web/curso2.jpg" />
            <div class="curso-info">
                <h4>Web Moderno com Javascript + Projetos</h4>
                <p>Prof. Sicrano Filho</p>
            </div>
            <div class="curso-preco">
                <span class="preco-de">R$80,00</span>
                <span class="preco-por">R$50,00</span>
            </div>
        </div>
    </div>
</body>

</html>
